{{- range $name, $runner := .Values.runners }}
{{- $fullname := printf "%s-runner-%s" (include "multica.fullname" $) $name }}
{{- $image := $runner.image | default dict }}
{{- $imageRepo := $image.repository | default $.Values.backend.image.repository }}
{{- $imageTag := $image.tag | default ($.Values.backend.image.tag | default $.Chart.AppVersion) }}
{{- $imagePull := $image.pullPolicy | default $.Values.backend.image.pullPolicy }}
{{- $serverUrl := $runner.serverUrl | default (printf "http://%s:%v" (include "multica.backend.serviceName" $) (int $.Values.backend.service.port)) }}
{{- $persistence := $runner.persistence | default dict }}
{{- $secCtx := $runner.securityContext | default dict }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "multica.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ include "multica.name" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: runner
    multica.ai/runner: {{ $name }}
spec:
  serviceName: {{ $fullname }}
  replicas: {{ $runner.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "multica.name" $ }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: runner
      multica.ai/runner: {{ $name }}
  template:
    metadata:
      {{- with $runner.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "multica.name" $ }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: runner
        multica.ai/runner: {{ $name }}
        {{- with $runner.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "multica.serviceAccountName" $ }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if $runner.auth }}
        # Write CLI config with auth token so the daemon can authenticate.
        # The multica CLI reads ~/.multica/config.json for session credentials.
        - name: init-auth
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /home/multica/.multica
              cat > /home/multica/.multica/config.json <<CONF
              {
                "server_url": {{ $serverUrl | quote }},
                "token": "$(cat /secrets/auth/{{ $runner.auth.key | default "token" }})"
              }
              CONF
              chmod 600 /home/multica/.multica/config.json
              # Write pi agent models.json so it can find providers even if
              # the built-in model catalog is incomplete.
              mkdir -p /home/multica/.pi/agent
              cat > /home/multica/.pi/agent/models.json <<'MODELS'
              {
                "providers": {
                  "zai": {
                    "baseUrl": "https://api.z.ai/api/coding/paas/v4",
                    "apiKey": "ZAI_API_KEY",
                    "api": "openai-completions",
                    "compat": {
                      "supportsDeveloperRole": false,
                      "thinkingFormat": "zai",
                      "zaiToolStream": true
                    },
                    "models": [
                      {
                        "id": "glm-5.1",
                        "name": "Z.AI GLM 5.1",
                        "reasoning": true,
                        "input": ["text"],
                        "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                        "contextWindow": 131072,
                        "maxTokens": 16384
                      }
                    ]
                  }
                }
              }
              MODELS
              chmod 600 /home/multica/.pi/agent/models.json
              chown -R 1000:1000 /home/multica
              chown -R 1000:1000 /workspaces
          volumeMounts:
            - name: home
              mountPath: /home/multica
            - name: workspaces
              mountPath: /workspaces
            - name: auth-secret
              mountPath: /secrets/auth
              readOnly: true
        {{- end }}
        {{- with $runner.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: daemon
          image: "{{ $imageRepo }}:{{ $imageTag }}"
          imagePullPolicy: {{ $imagePull }}
          command: ["./multica"]
          args: ["daemon", "start", "--foreground"]
          env:
            - name: MULTICA_SERVER_URL
              value: {{ $serverUrl | quote }}
            {{- if $runner.workspaceId }}
            - name: MULTICA_WORKSPACE_ID
              value: {{ $runner.workspaceId | quote }}
            {{- end }}
            - name: MULTICA_DAEMON_DEVICE_NAME
              value: {{ $runner.deviceName | default $fullname | quote }}
            - name: MULTICA_DAEMON_POLL_INTERVAL
              value: {{ $runner.pollInterval | default "3s" | quote }}
            - name: MULTICA_DAEMON_HEARTBEAT_INTERVAL
              value: {{ $runner.heartbeatInterval | default "15s" | quote }}
            - name: MULTICA_AGENT_TIMEOUT
              value: {{ $runner.agentTimeout | default "2h" | quote }}
            - name: MULTICA_DAEMON_MAX_CONCURRENT_TASKS
              value: {{ $runner.maxConcurrentTasks | default 20 | quote }}
            - name: MULTICA_WORKSPACES_ROOT
              value: /workspaces
            - name: HOME
              value: /home/multica
            {{- with $runner.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $runner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $secCtx }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
            - name: home
              mountPath: /home/multica
            {{- with $runner.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if $runner.auth }}
        - name: auth-secret
          secret:
            secretName: {{ $runner.auth.existingSecret }}
        {{- end }}
        {{- with $runner.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $runner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $runner.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $runner.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: workspaces
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if ($persistence.storageClass) }}
        storageClassName: {{ $persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $persistence.size | default "20Gi" }}
    - metadata:
        name: home
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if ($persistence.storageClass) }}
        storageClassName: {{ $persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: 1Gi
{{- end }}
