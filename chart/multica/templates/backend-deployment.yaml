apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multica.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    {{- include "multica.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "multica.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "multica.backend.selectorLabels" . | nindent 8 }}
        {{- with .Values.backend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "multica.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: {{ .Values.secret.keys.databaseUrl }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: {{ .Values.secret.keys.jwtSecret }}
            - name: FRONTEND_ORIGIN
              value: {{ .Values.config.frontendOrigin | quote }}
            - name: MULTICA_APP_URL
              value: {{ .Values.config.appUrl | quote }}
            - name: APP_ENV
              value: {{ .Values.config.appEnv | quote }}
            {{- if .Values.config.corsAllowedOrigins }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.config.corsAllowedOrigins | quote }}
            {{- end }}
            - name: ALLOW_SIGNUP
              value: {{ .Values.config.allowSignup | quote }}
            {{- if .Values.config.allowedEmailDomains }}
            - name: ALLOWED_EMAIL_DOMAINS
              value: {{ .Values.config.allowedEmailDomains | quote }}
            {{- end }}
            {{- if .Values.config.allowedEmails }}
            - name: ALLOWED_EMAILS
              value: {{ .Values.config.allowedEmails | quote }}
            {{- end }}
            {{- if .Values.config.cookieDomain }}
            - name: COOKIE_DOMAIN
              value: {{ .Values.config.cookieDomain | quote }}
            {{- end }}
            - name: RESEND_FROM_EMAIL
              value: {{ .Values.config.resendFromEmail | quote }}
            {{- if .Values.config.resendApiKey }}
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: {{ .Values.secret.keys.resendApiKey }}
            {{- end }}
            {{- if .Values.config.googleClientId }}
            - name: GOOGLE_CLIENT_ID
              value: {{ .Values.config.googleClientId | quote }}
            {{- end }}
            {{- if .Values.config.googleClientSecret }}
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: {{ .Values.secret.keys.googleClientSecret }}
            {{- end }}
            {{- if .Values.config.googleRedirectUri }}
            - name: GOOGLE_REDIRECT_URI
              value: {{ .Values.config.googleRedirectUri | quote }}
            {{- end }}
            {{- if .Values.config.s3Bucket }}
            - name: S3_BUCKET
              value: {{ .Values.config.s3Bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.config.s3Region | quote }}
            {{- end }}
            {{- if .Values.config.cloudfrontDomain }}
            - name: CLOUDFRONT_DOMAIN
              value: {{ .Values.config.cloudfrontDomain | quote }}
            {{- end }}
            {{- if .Values.config.cloudfrontKeyPairId }}
            - name: CLOUDFRONT_KEY_PAIR_ID
              value: {{ .Values.config.cloudfrontKeyPairId | quote }}
            {{- end }}
            {{- if .Values.config.cloudfrontPrivateKey }}
            - name: CLOUDFRONT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: {{ .Values.secret.keys.cloudfrontPrivateKey }}
            {{- end }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.backend.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.backend.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.backend.liveness.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.probes.backend.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.backend.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.backend.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.backend.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.backend.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.backend.readiness.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.probes.backend.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.backend.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.backend.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.backend.readiness.failureThreshold }}
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: uploads
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "multica.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
