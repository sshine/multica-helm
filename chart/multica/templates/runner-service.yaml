{{- range $name, $runner := .Values.runners }}
{{- $fullname := printf "%s-runner-%s" (include "multica.fullname" $) $name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "multica.labels" $ | nindent 4 }}
    app.kubernetes.io/component: runner
    multica.ai/runner: {{ $name }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "multica.name" $ }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: runner
    multica.ai/runner: {{ $name }}
{{- end }}
