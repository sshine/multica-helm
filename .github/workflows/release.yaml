name: Release Helm chart

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve chart version
        id: version
        run: |
          chart_version=$(awk '/^version:/ {print $2}' charts/multica/Chart.yaml)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$chart_version" != "$tag_version" ]; then
              echo "::error::Chart.yaml version ($chart_version) does not match tag ($tag_version)"
              exit 1
            fi
          fi
          echo "version=$chart_version" >> "$GITHUB_OUTPUT"
          echo "tarball=multica-${chart_version}.tgz" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        run: |
          helm package charts/multica
          namespace=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "${{ steps.version.outputs.tarball }}" "oci://ghcr.io/${namespace}/charts"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          files: ${{ steps.version.outputs.tarball }}
