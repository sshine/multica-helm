{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multica.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.config.databaseUrl }}
  {{ .Values.secret.keys.databaseUrl }}: {{ .Values.config.databaseUrl | quote }}
  {{- end }}
  {{ .Values.secret.keys.jwtSecret }}: {{ .Values.config.jwtSecret | quote }}
  {{- if .Values.config.resendApiKey }}
  {{ .Values.secret.keys.resendApiKey }}: {{ .Values.config.resendApiKey | quote }}
  {{- end }}
  {{- if .Values.config.googleClientSecret }}
  {{ .Values.secret.keys.googleClientSecret }}: {{ .Values.config.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.config.cloudfrontPrivateKey }}
  {{ .Values.secret.keys.cloudfrontPrivateKey }}: {{ .Values.config.cloudfrontPrivateKey | quote }}
  {{- end }}
{{- end }}
