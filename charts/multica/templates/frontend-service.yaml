apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.frontend.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    {{- include "multica.frontend.selectorLabels" . | nindent 4 }}
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "multica.frontend.selectorLabels" . | nindent 4 }}
