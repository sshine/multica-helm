apiVersion: v1
kind: Service
metadata:
  # Default: "backend" — must match the REMOTE_API_URL baked into the frontend image.
  name: {{ include "multica.backend.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    {{- include "multica.backend.selectorLabels" . | nindent 4 }}
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "multica.backend.selectorLabels" . | nindent 4 }}
